openapi: 3.1.0
info:
  title: Atlas Risk & Disputes API
  version: 0.2.0
  description: Risk engine, fraud signals, dispute management, evidence, and representment
  contact:
    name: AtlasPayments Team
    url: https://github.com/shivemind/atlaspayments
servers:
  - url: http://localhost:3003
    description: Local development server. Override via Postman {{baseUrl}} environment variable.
tags:
  - name: RiskRules
    description: Risk ruleset configuration and management
  - name: RiskSignals
    description: Risk signal ingestion
  - name: RiskDecisions
    description: Risk decision logs and admin overrides
  - name: RiskReviews
    description: Manual risk review queue
  - name: Disputes
    description: Dispute lifecycle management
  - name: DisputeEvidence
    description: Evidence submission and management for disputes
  - name: Representment
    description: Dispute representment simulation
paths:
  /api/v1/disputes:
    get:
      summary: List disputes
      description: Returns a paginated list of disputes. Optionally filter by status or payment_intent_id.
      x-platform:
        kind: resource
        entity: Dispute
        affectsLedger: false
      operationId: listDisputes
      tags:
        - Disputes
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: status
          in: query
          schema:
            type: string
            enum:
              - needs_response
              - under_review
              - won
              - lost
              - accepted
              - expired
        - name: payment_intent_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of disputes.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Dispute"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create dispute
      description: Creates a dispute against a payment intent.
      x-platform:
        kind: resource
        entity: Dispute
        emitsEvents:
          - dispute.created
        affectsLedger: false
      operationId: createDispute
      tags:
        - Disputes
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_intent_id
                - reason
                - amount
                - currency
              properties:
                payment_intent_id:
                  type: string
                reason:
                  type: string
                  enum:
                    - fraudulent
                    - duplicate
                    - not_received
                    - product_unacceptable
                    - subscription_canceled
                    - other
                amount:
                  type: integer
                  minimum: 1
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                due_by:
                  type: string
                  format: date-time
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Dispute created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - dispute
                properties:
                  dispute:
                    $ref: "#/components/schemas/Dispute"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment intent not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}:
    get:
      summary: Get dispute by ID
      description: Returns a single dispute.
      x-platform:
        kind: resource
        entity: Dispute
        affectsLedger: false
      operationId: getDisputeById
      tags:
        - Disputes
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Dispute found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - dispute
                properties:
                  dispute:
                    $ref: "#/components/schemas/Dispute"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update dispute
      description: Updates metadata or due_by on an open dispute. Cannot update closed disputes.
      x-platform:
        kind: transition
        entity: Dispute
        emitsEvents:
          - dispute.updated
        affectsLedger: false
        stateChanges:
          - metadata_updated
      operationId: updateDispute
      tags:
        - Disputes
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  additionalProperties: true
                due_by:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Dispute updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - dispute
                properties:
                  dispute:
                    $ref: "#/components/schemas/Dispute"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Dispute is closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}/accept:
    post:
      summary: Accept dispute
      description: Accepts the dispute, closing it in the customer's favor.
      x-platform:
        kind: transition
        entity: Dispute
        stateChanges:
          - needs_response -> accepted
        emitsEvents:
          - dispute.accepted
        affectsLedger: false
      operationId: acceptDispute
      tags:
        - Disputes
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Dispute accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - dispute
                properties:
                  dispute:
                    $ref: "#/components/schemas/Dispute"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid state transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}/evidence:
    get:
      summary: List dispute evidence
      description: Returns paginated evidence for a dispute.
      x-platform:
        kind: resource
        entity: DisputeEvidence
        affectsLedger: false
      operationId: listDisputeEvidence
      tags:
        - DisputeEvidence
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of evidence.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DisputeEvidence"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Add dispute evidence
      description: Adds a piece of evidence to an open dispute.
      x-platform:
        kind: resource
        entity: DisputeEvidence
        emitsEvents:
          - dispute.evidence.created
        affectsLedger: false
      operationId: addDisputeEvidence
      tags:
        - DisputeEvidence
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - receipt
                    - shipping_proof
                    - customer_communication
                    - service_documentation
                    - policy_disclosure
                    - other
                file_name:
                  type: string
                  maxLength: 255
                file_size:
                  type: integer
                  minimum: 1
                description:
                  type: string
                  maxLength: 2000
      responses:
        "201":
          description: Evidence added.
          content:
            application/json:
              schema:
                type: object
                required:
                  - evidence
                properties:
                  evidence:
                    $ref: "#/components/schemas/DisputeEvidence"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Dispute is closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}/evidence/{evidenceId}:
    get:
      summary: Get evidence by ID
      description: Returns a single piece of evidence.
      x-platform:
        kind: resource
        entity: DisputeEvidence
        affectsLedger: false
      operationId: getDisputeEvidenceById
      tags:
        - DisputeEvidence
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - name: evidenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evidence found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - evidence
                properties:
                  evidence:
                    $ref: "#/components/schemas/DisputeEvidence"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute or evidence not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete evidence
      description: Deletes unsubmitted evidence from an open dispute.
      x-platform:
        kind: transition
        entity: DisputeEvidence
        emitsEvents:
          - dispute.evidence.deleted
        affectsLedger: false
        stateChanges:
          - evidence_removed
      operationId: deleteDisputeEvidence
      tags:
        - DisputeEvidence
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - name: evidenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evidence deleted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                  - id
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute or evidence not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Evidence already submitted or dispute closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}/evidence/submit:
    post:
      summary: Submit all evidence
      description: Submits all unsubmitted evidence and transitions the dispute to under_review.
      x-platform:
        kind: transition
        entity: Dispute
        stateChanges:
          - needs_response -> under_review
        emitsEvents:
          - dispute.evidence.submitted
        affectsLedger: false
      operationId: submitDisputeEvidence
      tags:
        - DisputeEvidence
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Evidence submitted and dispute moved to under_review.
          content:
            application/json:
              schema:
                type: object
                required:
                  - dispute
                  - evidence
                properties:
                  dispute:
                    $ref: "#/components/schemas/Dispute"
                  evidence:
                    type: array
                    items:
                      $ref: "#/components/schemas/DisputeEvidence"
        "400":
          description: No unsubmitted evidence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Dispute is closed or invalid transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}/representment:
    get:
      summary: Get representment
      description: Returns the representment for a dispute (paginated wrapper for consistency).
      x-platform:
        kind: resource
        entity: Representment
        affectsLedger: false
      operationId: getDisputeRepresentment
      tags:
        - Representment
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Representment list (0 or 1 items).
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Representment"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create representment
      description: Creates a representment for a dispute. Only one per dispute.
      x-platform:
        kind: resource
        entity: Representment
        emitsEvents:
          - dispute.representment.created
        affectsLedger: false
      operationId: createRepresentment
      tags:
        - Representment
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                details:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Representment created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - representment
                properties:
                  representment:
                    $ref: "#/components/schemas/Representment"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Representment already exists or dispute is closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/disputes/{id}/representment/submit:
    post:
      summary: Submit representment
      description: Submits the representment and transitions the dispute to under_review.
      x-platform:
        kind: transition
        entity: Representment
        stateChanges:
          - needs_response -> under_review
        emitsEvents:
          - dispute.representment.submitted
        affectsLedger: false
      operationId: submitRepresentment
      tags:
        - Representment
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Representment submitted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - dispute
                  - representment
                properties:
                  dispute:
                    $ref: "#/components/schemas/Dispute"
                  representment:
                    $ref: "#/components/schemas/Representment"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Dispute or representment not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Representment already submitted or invalid transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/risk/signals:
    get:
      summary: List risk signals
      description: Returns a paginated list of risk signals for the merchant.
      x-platform:
        kind: resource
        entity: RiskSignal
        affectsLedger: false
      operationId: listRiskSignals
      tags:
        - RiskSignals
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of risk signals.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a risk signal
      description: Ingests a new risk signal for a given entity.
      x-platform:
        kind: resource
        entity: RiskSignal
        emitsEvents:
          - risk_signal.created
        affectsLedger: false
      operationId: createRiskSignal
      tags:
        - RiskSignals
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_type
                - entity_id
                - signal_type
                - severity
              properties:
                entity_type:
                  type: string
                entity_id:
                  type: string
                signal_type:
                  type: string
                severity:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
      responses:
        "201":
          description: Risk signal created.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/risk/signals/{id}:
    get:
      summary: Get risk signal by ID
      description: Returns a single risk signal.
      x-platform:
        kind: resource
        entity: RiskSignal
        affectsLedger: false
      operationId: getRiskSignalById
      tags:
        - RiskSignals
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Risk signal found.
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Risk signal not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/risk/rulesets:
    get:
      summary: List risk rulesets
      description: Returns a paginated list of risk rulesets.
      x-platform:
        kind: resource
        entity: RiskRuleset
        affectsLedger: false
      operationId: listRiskRulesets
      tags:
        - RiskRules
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of risk rulesets.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a risk ruleset
      description: Creates a new risk ruleset for the merchant.
      x-platform:
        kind: resource
        entity: RiskRuleset
        emitsEvents:
          - risk_ruleset.created
        affectsLedger: false
      operationId: createRiskRuleset
      tags:
        - RiskRules
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Risk ruleset created.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/risk/rulesets/{id}:
    get:
      summary: Get risk ruleset by ID
      description: Returns a single risk ruleset.
      x-platform:
        kind: resource
        entity: RiskRuleset
        affectsLedger: false
      operationId: getRiskRulesetById
      tags:
        - RiskRules
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Risk ruleset found.
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Risk ruleset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      summary: Update risk ruleset
      description: Updates an existing risk ruleset.
      x-platform:
        kind: transition
        entity: RiskRuleset
        emitsEvents:
          - risk_ruleset.updated
        affectsLedger: false
        stateChanges:
          - metadata_updated
      operationId: updateRiskRuleset
      tags:
        - RiskRules
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Risk ruleset updated.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
