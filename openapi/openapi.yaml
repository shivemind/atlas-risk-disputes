  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      description: |
        Client-generated unique key for safe request retries. Identical key + payload replays the original response.
      schema:
        type: string
        example: idem-key-a1b2c3d4
    PageParam:
      in: query
      name: page
      description: Page number (1-indexed).
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      in: query
      name: pageSize
      description: Number of results per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    PathId:
      in: path
      name: id
      required: true
      description: Resource identifier.
      schema:
        type: string
  headers:
    X-Signature:
      description: HMAC SHA-256 signature computed over `timestamp.payload`.
      schema:
        type: string
    X-Timestamp:
      description: Unix timestamp (seconds) at webhook delivery time.
      schema:
        type: string
    X-Event-Type:
      description: Webhook event type string (e.g. `payment_intent.succeeded`).
      schema:
        type: string
    X-RateLimit-Limit:
      description: Maximum requests allowed in the current fixed window.
      schema:
        type: string
    X-RateLimit-Remaining:
      description: Requests remaining in the current fixed window.
      schema:
        type: string
    X-RateLimit-Reset:
      description: Unix timestamp when the current rate-limit window resets.
      schema:
        type: string
