name: Postman Catalog Onboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  collection-run:
    name: Run API Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection
        run: |
          postman collection run 52400725-5ce4d4a3-7ab8-4946-a96c-fc2e05bb5a99 \
            -e 52400725-bdb3cc97-1829-4c13-9f45-ef9af8512c40 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Trigger Monitor Run
        run: |
          curl -sf -X POST "https://api.getpostman.com/monitors/52400725-1f11e404-8cb9-4dc0-b949-6737ffb1e816/run" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}"

      - name: Summary
        if: always()
        run: |
          echo "### Postman Catalog Onboard - Atlas Risk & Disputes" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: 52400725-5ce4d4a3-7ab8-4946-a96c-fc2e05bb5a99" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitor**: 52400725-1f11e404-8cb9-4dc0-b949-6737ffb1e816" >> $GITHUB_STEP_SUMMARY
