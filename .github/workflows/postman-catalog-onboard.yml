name: Postman Catalog Onboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  collection-run:
    name: Run API Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection
        run: |
          postman collection run 52400725-babd6cf7-305b-4078-8680-73462cba1398 \
            -e 52400725-bdb3cc97-1829-4c13-9f45-ef9af8512c40 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Trigger Monitor Run
        continue-on-error: true
        run: |
          MONITOR_UID=$(curl -sf "https://api.getpostman.com/monitors" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" \
            | jq -r '.monitors[] | select(.name == "Atlas Risk & Disputes API - Health Monitor") | .uid' | head -1)
          if [ -n "$MONITOR_UID" ]; then
            echo "Triggering monitor $MONITOR_UID"
            curl -sf -X POST "https://api.getpostman.com/monitors/$MONITOR_UID/run" \
              -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" || true
          else
            echo "Monitor not found, skipping"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Postman Catalog Onboard - Atlas Risk & Disputes" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: 52400725-babd6cf7-305b-4078-8680-73462cba1398" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: [44fd816d-618b-4d67-bba0-6505364909de](https://go.postman.co/workspace/44fd816d-618b-4d67-bba0-6505364909de)" >> $GITHUB_STEP_SUMMARY